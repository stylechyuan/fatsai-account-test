<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17324d">
  <title>發財水產管理系統 V2.0</title>
  <link rel="manifest" href="manifest.json">
  <style>
    
    :root{
      --navy:#17324d;--bg:#eef3f7;--card:#fff;--ink:#17212b;--muted:#6b7680;
      --line:#7f8a94;--gray:#e5e7e9;--purple:#e6dcf4;
      --green:#d9ead3;--yellow:#fff2cc;--blue:#d9eaf7;--orange:#fce5cd;--red:#f4cccc;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",sans-serif}
    header{position:sticky;top:0;z-index:10;background:var(--navy);color:#fff;padding:16px;font-size:22px;font-weight:900}
    main{max-width:1100px;margin:auto;padding:12px}
    .card{background:var(--card);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 4px 16px #00000010}
    label{display:block;font-weight:900;margin:6px 0}
    input,textarea,button{font:inherit}
    input,textarea{width:100%;padding:11px;border:1px solid #b8c3cc;border-radius:10px;background:#fff}
    textarea{min-height:300px;line-height:1.5}
    .hint{font-size:13px;color:var(--muted);line-height:1.5;margin-top:8px}
    .actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
    button{border:0;border-radius:12px;padding:13px 10px;font-weight:900;background:#dbe4ec;color:#17212b}
    button.primary{background:var(--navy);color:#fff}
    button.good{background:#287748;color:#fff}
    button.warn{background:#9a6a18;color:#fff}
    .status{margin-top:10px;padding:10px;border-radius:10px;background:#f5f7f9;white-space:pre-wrap;font-size:14px}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
    .summary div{background:#f5f7f9;border-radius:10px;padding:9px;text-align:center}
    .summary b{display:block;font-size:20px}
    .preview-toolbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
    .preview-toolbar strong{font-size:18px}
    #previewStage{overflow:auto;padding-bottom:10px}
    .page{
      width:200mm;min-height:287mm;background:#fff;margin:0 auto 14px;padding:0;
      box-shadow:0 4px 20px #0002;position:relative;
    }
    .page-title{text-align:center;font-size:15pt;font-weight:900;margin-bottom:3mm}
    .sheet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2mm;align-items:start}
    .col{display:flex;flex-direction:column;gap:1mm}
    .customer{border:1px solid var(--line);break-inside:avoid;background:#fff}
    .customer-name{font-size:10.5pt;font-weight:900;text-align:left;padding:1.8mm 1.6mm;background:var(--gray);border-bottom:1px solid var(--line);min-height:8mm}
    .customer-name.tail{background:var(--purple)}
    .item{font-size:8.8pt;padding:1.35mm 1.5mm;border-bottom:1px solid #aeb5bb;line-height:1.22}
    .item:last-child{border-bottom:0}
    .green{background:var(--green)}.yellow{background:var(--yellow)}.blue{background:var(--blue)}
    .orange{background:var(--orange)}.red{background:var(--red)}
    .hidden{display:none}
    @media(max-width:760px){
      .actions,.summary{grid-template-columns:1fr}
      .page{transform:scale(.52);transform-origin:top left;margin-bottom:-138mm}
    }
    @media print{
      @page{size:A4 portrait;margin:5mm}
      html,body{width:210mm;background:#fff}
      header,.input-card,.preview-toolbar{display:none!important}
      main{padding:0;max-width:none}
      .card{box-shadow:none;padding:0;margin:0}
      #previewStage{overflow:visible}
      .page{width:200mm;min-height:287mm;margin:0;padding:0;box-shadow:none;transform:none!important;page-break-after:always}
      .page:last-child{page-break-after:auto}
    }
  

    /* V2 login + dashboard */
    .app-view{display:none}
    .app-view.active{display:block}
    #loginView{min-height:100vh;background:linear-gradient(180deg,#17324d 0,#244c70 38%,#eef3f7 38%);padding:44px 16px}
    .login-shell{max-width:430px;margin:auto}
    .brand{text-align:center;color:#fff;margin-bottom:26px}
    .brand .fish{font-size:54px;line-height:1}
    .brand h1{font-size:27px;margin:10px 0 4px}
    .brand p{margin:0;opacity:.85}
    .login-card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 10px 32px #0003}
    .login-card input{font-size:17px;margin-bottom:12px}
    .login-card button{width:100%;font-size:17px}
    .remember-row{display:flex;align-items:center;gap:8px;margin:2px 0 14px;color:#52606c}
    .remember-row input{width:auto;margin:0}
    .login-error{color:#b42318;min-height:22px;margin:8px 0 0;font-weight:700}
    .first-note{font-size:13px;color:#66727d;background:#f4f6f8;padding:10px;border-radius:10px;margin-top:12px}
    .topbar{position:sticky;top:0;z-index:20;background:#17324d;color:#fff;padding:13px 15px;display:flex;align-items:center;justify-content:space-between}
    .topbar h1{font-size:19px;margin:0}
    .user-button{background:#ffffff20;color:#fff;padding:8px 11px;border-radius:999px;font-size:14px}
    .dashboard{max-width:820px;margin:auto;padding:14px}
    .welcome-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 4px 16px #0001}
    .welcome-card h2{margin:0 0 5px}
    .role-pill{display:inline-block;border-radius:999px;padding:5px 10px;background:#e8eef4;font-size:13px;font-weight:800}
    .menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .menu-card{background:#fff;border-radius:16px;padding:18px 14px;text-align:left;box-shadow:0 4px 16px #0001;min-height:112px}
    .menu-card .icon{font-size:31px;display:block;margin-bottom:8px}
    .menu-card b{font-size:18px;display:block}
    .menu-card small{color:#6b7680;display:block;margin-top:5px}
    .menu-card.disabled{opacity:.48}
    .back-row{display:flex;align-items:center;gap:10px;background:#eef3f7;padding:10px 12px}
    .back-row button{padding:9px 12px;background:#dce5ed}
    .modal{position:fixed;inset:0;background:#0008;z-index:50;display:none;align-items:center;justify-content:center;padding:18px}
    .modal.open{display:flex}
    .modal-card{width:min(430px,100%);background:#fff;border-radius:18px;padding:18px}
    .modal-card h2{margin-top:0}
    .modal-card input{margin-bottom:10px}
    .modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .danger{background:#b42318!important;color:#fff!important}
    .security-note{font-size:12px;color:#6b7680;margin-top:12px;line-height:1.45}
    @media(max-width:520px){.menu-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<section id="loginView" class="app-view active">
  <div class="login-shell">
    <div class="brand">
      <div class="fish">🐟</div>
      <h1>發財水產管理系統</h1>
      <p>測試版 V2.0</p>
    </div>
    <div class="login-card">
      <label>登入帳號</label>
      <input id="loginUser" autocomplete="username" autocapitalize="none" placeholder="chuan / tina / chan / ping">
      <label>密碼</label>
      <input id="loginPassword" type="password" autocomplete="current-password" inputmode="numeric" placeholder="預設密碼 1234">
      <label class="remember-row"><input id="rememberMe" type="checkbox"> 記住登入</label>
      <button class="primary" id="loginBtn">登入</button>
      <div id="loginError" class="login-error"></div>
      <div class="first-note">所有帳號第一次登入皆使用 <b>1234</b>，登入後必須先修改密碼。</div>
    </div>
  </div>
</section>

<section id="homeView" class="app-view">
  <div class="topbar">
    <h1>發財水產管理系統</h1>
    <button class="user-button" id="userMenuBtn">👤 <span id="topUserName"></span></button>
  </div>
  <main class="dashboard">
    <section class="welcome-card">
      <h2>歡迎回來，<span id="welcomeName"></span></h2>
      <span id="roleText" class="role-pill"></span>
    </section>
    <section class="menu-grid" id="menuGrid">
      <button class="menu-card" id="openPicking">
        <span class="icon">🐟</span><b>理貨中心</b><small>整理訂單、Excel、A4列印</small>
      </button>
      <button class="menu-card disabled admin-only" disabled>
        <span class="icon">📷</span><b>掃描帳單</b><small>下一版開發</small>
      </button>
      <button class="menu-card disabled admin-only" disabled>
        <span class="icon">👥</span><b>客戶帳務</b><small>下一版開發</small>
      </button>
      <button class="menu-card disabled admin-only" disabled>
        <span class="icon">📒</span><b>對帳中心</b><small>下一版開發</small>
      </button>
    </section>
  </main>
</section>

<section id="pickingView" class="app-view">
  <div class="topbar">
    <h1>理貨中心</h1>
    <button class="user-button" id="pickingUserName"></button>
  </div>
  <div class="back-row"><button id="backHome">← 回首頁</button></div>
  <main>
    <section class="card input-card">
      <label>日期</label>
      <input id="date" value="7/15（三）">
      <label style="margin-top:10px">貼上今日訂單</label>
      <textarea id="orders" spellcheck="false"></textarea>
      <div class="hint">每位客戶用空白行分隔；第一行為客戶名稱，下面每行一筆品項。</div>
      <div class="actions">
        <button class="primary" id="previewBtn">整理並預覽</button>
        <button class="good" id="excelBtn">下載 Excel</button>
        <button class="warn" id="printBtn">列印／存 PDF</button>
      </div>
      <div class="summary">
        <div>客戶<b id="customerCount">0</b></div>
        <div>品項<b id="itemCount">0</b></div>
        <div>抓尾<b id="tailCount">0</b></div>
        <div>頁數<b id="pageCount">0</b></div>
      </div>
      <div id="status" class="status">尚未整理。</div>
    </section>
    <section class="card">
      <div class="preview-toolbar">
        <strong>列印預覽</strong>
        <span id="pageStatus">尚未產生</span>
      </div>
      <div id="previewStage"></div>
    </section>
  </main>
</section>

<div id="passwordModal" class="modal">
  <div class="modal-card">
    <h2>首次登入：修改密碼</h2>
    <p>為保護帳號，請先設定自己的新密碼。</p>
    <label>新密碼</label>
    <input id="newPassword" type="password" inputmode="numeric" placeholder="至少 4 碼">
    <label>確認新密碼</label>
    <input id="confirmPassword" type="password" inputmode="numeric" placeholder="再次輸入">
    <div id="passwordError" class="login-error"></div>
    <button class="primary" id="savePassword">儲存並進入系統</button>
  </div>
</div>

<div id="userModal" class="modal">
  <div class="modal-card">
    <h2 id="modalUserName"></h2>
    <div class="modal-actions">
      <button id="changePasswordBtn">修改密碼</button>
      <button class="danger" id="logoutBtn">登出</button>
    </div>
    <button style="width:100%;margin-top:8px" id="closeUserModal">取消</button>
    <div class="security-note">本版為 GitHub Pages 測試版，密碼與登入狀態只儲存在目前這支手機的瀏覽器中，不會跨手機同步。</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script>
const USERS = {
  chuan: {name:"家銓", role:"系統管理員", admin:true},
  tina:  {name:"恬恬", role:"管理者", admin:true},
  chan:  {name:"光展", role:"管理者", admin:true},
  ping:  {name:"平", role:"理貨人員", admin:false}
};
const DEFAULT_PASSWORD = "1234";
const LS_PASSWORDS = "fatsai_test_passwords_v2";
const LS_CHANGED = "fatsai_test_changed_v2";
const LS_SESSION = "fatsai_test_session_v2";

let currentUser = null;
let pendingUser = null;
let pickingInitialized = false;

function getPasswords(){
  return JSON.parse(localStorage.getItem(LS_PASSWORDS) || '{}');
}
function getChanged(){
  return JSON.parse(localStorage.getItem(LS_CHANGED) || '{}');
}
function showView(id){
  document.querySelectorAll(".app-view").forEach(v=>v.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}
function enterHome(username){
  currentUser = username;
  const u = USERS[username];
  document.getElementById("topUserName").textContent = u.name;
  document.getElementById("welcomeName").textContent = u.name;
  document.getElementById("roleText").textContent = u.role;
  document.getElementById("pickingUserName").textContent = "👤 "+u.name;
  document.querySelectorAll(".admin-only").forEach(el=>el.style.display=u.admin?"block":"none");
  showView("homeView");
}
function login(){
  const username=document.getElementById("loginUser").value.trim().toLowerCase();
  const password=document.getElementById("loginPassword").value;
  const err=document.getElementById("loginError");
  if(!USERS[username]){err.textContent="帳號不存在";return}
  const passwords=getPasswords();
  const expected=passwords[username] || DEFAULT_PASSWORD;
  if(password!==expected){err.textContent="密碼錯誤";return}
  err.textContent="";
  pendingUser=username;
  const changed=getChanged();
  if(!changed[username]){
    document.getElementById("newPassword").value="";
    document.getElementById("confirmPassword").value="";
    document.getElementById("passwordError").textContent="";
    document.getElementById("passwordModal").classList.add("open");
    return;
  }
  if(document.getElementById("rememberMe").checked){
    localStorage.setItem(LS_SESSION,username);
  } else {
    sessionStorage.setItem(LS_SESSION,username);
  }
  enterHome(username);
}
function saveNewPassword(){
  const p1=document.getElementById("newPassword").value;
  const p2=document.getElementById("confirmPassword").value;
  const err=document.getElementById("passwordError");
  if(p1.length<4){err.textContent="新密碼至少 4 碼";return}
  if(p1!==p2){err.textContent="兩次密碼不一致";return}
  const passwords=getPasswords(); passwords[pendingUser]=p1;
  localStorage.setItem(LS_PASSWORDS,JSON.stringify(passwords));
  const changed=getChanged(); changed[pendingUser]=true;
  localStorage.setItem(LS_CHANGED,JSON.stringify(changed));
  document.getElementById("passwordModal").classList.remove("open");
  if(document.getElementById("rememberMe").checked) localStorage.setItem(LS_SESSION,pendingUser);
  else sessionStorage.setItem(LS_SESSION,pendingUser);
  enterHome(pendingUser);
}
function logout(){
  localStorage.removeItem(LS_SESSION);
  sessionStorage.removeItem(LS_SESSION);
  currentUser=null;
  document.getElementById("loginPassword").value="";
  document.getElementById("userModal").classList.remove("open");
  showView("loginView");
}
document.getElementById("loginBtn").onclick=login;
document.getElementById("loginPassword").addEventListener("keydown",e=>{if(e.key==="Enter")login()});
document.getElementById("savePassword").onclick=saveNewPassword;
document.getElementById("openPicking").onclick=()=>{showView("pickingView"); if(!pickingInitialized){initPicking();pickingInitialized=true}};
document.getElementById("backHome").onclick=()=>showView("homeView");
document.getElementById("userMenuBtn").onclick=()=>{
  document.getElementById("modalUserName").textContent=USERS[currentUser].name+"（"+USERS[currentUser].role+"）";
  document.getElementById("userModal").classList.add("open");
};
document.getElementById("pickingUserName").onclick=document.getElementById("userMenuBtn").onclick;
document.getElementById("closeUserModal").onclick=()=>document.getElementById("userModal").classList.remove("open");
document.getElementById("logoutBtn").onclick=logout;
document.getElementById("changePasswordBtn").onclick=()=>{
  pendingUser=currentUser;
  document.getElementById("userModal").classList.remove("open");
  document.getElementById("passwordModal").classList.add("open");
};

const remembered=localStorage.getItem(LS_SESSION)||sessionStorage.getItem(LS_SESSION);
if(remembered && USERS[remembered]) enterHome(remembered);

function initPicking(){

const $=id=>document.getElementById(id);
const vehicleOrder=["5017","5333","1727","2265","2878","5708","6732"];
const MAX_LINES_PER_COL=45;

const sample=`5017（冰鮮）
鯊魚15公斤
大串尾－1件
黃魚（4/5）－1件
午魚（31～32尾）－2件
紅衫（12～14尾）－1件
金龍（13～14尾）－1件
黑格（12尾）－1件
尼羅（5尾）－2件
七星（10尾）－1件

1727
金目（13～15尾）－2件
七星（10尾）－1件
紅衫（13～15尾）－1件
黃魚（4/5）－1件
尼羅（10尾）－1件
特鯖－1件

5333
午魚（35尾）－2件
金目（13～15尾）－1件
七星－1件
紅衫－1件
黃魚（4/5）－1件
石斑－1件
黑格－1件
尼羅－1件
鱸魚片－1件

2265（汽車）
午魚（30尾）－1件
金目（15尾）－1件

新發
七星（9尾）－2件
紅衫（10尾）－1件

美玲
午魚－6條
紅衫－4條
金龍－4條
龍虎－2條
班頭－3條
七星－4條

杜
黃魚－2尾
大午－2尾
班頭－2尾
七星－5尾
赤鯮－2尾
石斑－2尾
紅衫－2尾

玉支
七星（9尾）－1件
土魠－1尾

小羅
金目（12尾）－1件
黃魚（4/5）－1件

1919
金目－2件
七星－1件`;
$("orders").value=localStorage.getItem("jq_orders_v01")||sample;
$("date").value=localStorage.getItem("jq_date_v01")||"7/15（三）";

function normalize(s){
  return s.replace(/午仔魚|午仔/g,"午魚")
    .replace(/七星鱸魚|七星鱸/g,"七星")
    .replace(/紅尼羅|紅尼|紅泥/g,"尼羅")
    .replace(/紅杉/g,"紅衫")
    .replace(/加1/g,"1件")
    .trim();
}
function parseOrders(){
  const raw=$("orders").value.replace(/\r/g,"").trim();
  if(!raw) return [];
  const blocks=raw.split(/\n\s*\n+/).map(x=>x.trim()).filter(Boolean);
  const customers=[];
  for(const block of blocks){
    const lines=block.split("\n").map(x=>normalize(x.replace(/^[*•\-]\s*/,""))).filter(Boolean);
    if(lines.length<2) continue;
    customers.push({name:lines[0],items:lines.slice(1)});
  }
  return customers.sort((a,b)=>{
    const ai=vehicleOrder.findIndex(v=>a.name.includes(v));
    const bi=vehicleOrder.findIndex(v=>b.name.includes(v));
    if(ai>=0&&bi>=0)return ai-bi;
    if(ai>=0)return -1;
    if(bi>=0)return 1;
    return 0;
  });
}
function isTail(item){
  return /(?:－|-|×|x)?\s*\d+\s*(尾|條)\s*$/.test(item) ||
         /(?:一|二|三|四|五|六|七|八|九|十)\s*(尾|條)\s*$/.test(item);
}
function colorClass(item){
  if(item.includes("金目"))return "green";
  if(item.includes("黃魚")||item.includes("黃花"))return "yellow";
  if(item.includes("土魠"))return "orange";
  if(["赤鯮","金線","白鯧","赤筆","黑毛"].some(x=>item.includes(x)))return "red";
  const m=item.match(/午魚[^0-9]*(\d{2})/);
  if(m && +m[1]>=27 && +m[1]<=35)return "blue";
  return "";
}
function customerHeight(c){ return c.items.length+1; }

function paginate(customers){
  const pages=[];
  let current=[[],[],[],[]], heights=[0,0,0,0];
  for(const c of customers){
    const h=customerHeight(c);
    let idx=heights.indexOf(Math.min(...heights));
    if(heights[idx]+h>MAX_LINES_PER_COL){
      pages.push(current);
      current=[[],[],[],[]];
      heights=[0,0,0,0];
      idx=0;
    }
    current[idx].push(c);
    heights[idx]+=h;
  }
  if(current.some(col=>col.length))pages.push(current);
  return pages;
}
function render(){
  const customers=parseOrders();
  localStorage.setItem("jq_orders_v01",$("orders").value);
  localStorage.setItem("jq_date_v01",$("date").value);
  const pages=paginate(customers);
  const stage=$("previewStage"); stage.innerHTML="";
  pages.forEach((cols,pIndex)=>{
    const page=document.createElement("div"); page.className="page";
    const title=document.createElement("div"); title.className="page-title";
    title.textContent=`${$("date").value} 理貨單${pages.length>1?`（第 ${pIndex+1} 頁）`:""}`;
    page.appendChild(title);
    const grid=document.createElement("div"); grid.className="sheet-grid";
    cols.forEach(col=>{
      const cd=document.createElement("div"); cd.className="col";
      col.forEach(c=>{
        const box=document.createElement("section"); box.className="customer";
        const n=document.createElement("div");
        n.className="customer-name"+(c.items.some(isTail)?" tail":"");
        n.textContent=c.name; box.appendChild(n);
        c.items.forEach(item=>{
          const d=document.createElement("div");
          d.className="item "+colorClass(item);
          d.textContent="□ "+item;
          box.appendChild(d);
        });
        cd.appendChild(box);
      });
      grid.appendChild(cd);
    });
    page.appendChild(grid); stage.appendChild(page);
  });
  const items=customers.reduce((n,c)=>n+c.items.length,0);
  const tails=customers.filter(c=>c.items.some(isTail)).length;
  $("customerCount").textContent=customers.length;
  $("itemCount").textContent=items;
  $("tailCount").textContent=tails;
  $("pageCount").textContent=pages.length;
  $("pageStatus").textContent=pages.length===1?"一張 A4":"需要 "+pages.length+" 張 A4";
  $("status").textContent=`已整理：${customers.length} 位客戶、${items} 筆品項。\n列印邊界：上下左右 5 mm。`;
  return {customers,pages};
}

async function downloadExcel(){
  const {customers,pages}=render();
  if(!customers.length){alert("沒有可輸出的訂單");return}
  if(typeof ExcelJS==="undefined"){alert("Excel 元件尚未載入，請確認網路後再試。");return}
  const wb=new ExcelJS.Workbook();
  const border={top:{style:"thin"},left:{style:"thin"},bottom:{style:"thin"},right:{style:"thin"}};
  const fillMap={green:"FFD9EAD3",yellow:"FFFFF2CC",blue:"FFD9EAF7",orange:"FFFCE5CD",red:"FFF4CCCC"};

  pages.forEach((cols,pIndex)=>{
    const ws=wb.addWorksheet(pages.length===1?"理貨單":`理貨單${pIndex+1}`);
    ws.pageSetup={
      paperSize:9,orientation:"portrait",fitToPage:false,scale:100,
      horizontalCentered:false,verticalCentered:false,
      margins:{left:0.19685,right:0.19685,top:0.19685,bottom:0.19685,header:0,footer:0}
    };
    ws.columns=[{width:24.5},{width:24.5},{width:24.5},{width:24.5}];
    ws.mergeCells("A1:D1");
    const t=ws.getCell("A1");
    t.value=`${$("date").value} 理貨單${pages.length>1?`（第 ${pIndex+1} 頁）`:""}`;
    t.font={bold:true,size:15}; t.alignment={horizontal:"center",vertical:"middle"};
    ws.getRow(1).height=24;

    for(let ci=0;ci<4;ci++){
      let r=2;
      cols[ci].forEach(c=>{
        let cell=ws.getCell(r,ci+1);
        cell.value=c.name;
        cell.font={bold:true,size:11};
        cell.alignment={horizontal:"left",vertical:"middle",wrapText:true};
        cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:c.items.some(isTail)?"FFE6DCF4":"FFE5E7E9"}};
        cell.border=border; ws.getRow(r).height=21; r++;
        c.items.forEach(item=>{
          cell=ws.getCell(r,ci+1);
          cell.value="□ "+item;
          cell.font={size:10};
          cell.alignment={horizontal:"left",vertical:"middle",wrapText:true};
          cell.border=border;
          const cls=colorClass(item);
          if(cls)cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:fillMap[cls]}};
          ws.getRow(r).height=19; r++;
        });
      });
    }
    const lastRow=Math.max(...cols.map(col=>col.reduce((n,c)=>n+customerHeight(c),0)))+1;
    ws.pageSetup.printArea=`A1:D${Math.max(lastRow,20)}`;
  });

  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=($("date").value.replace(/[\/（）()]/g,"_").replace(/\s+/g,"")||"今日")+"理貨單.xlsx";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}

$("previewBtn").onclick=render;
$("excelBtn").onclick=downloadExcel;
$("printBtn").onclick=()=>{render();window.print()};
render();
if("serviceWorker" in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});

}
</script>
